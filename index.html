<!DOCTYPE html>
<html class>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de tareas</title>
  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Layout principal: estructura flexible de toda la app -->
  <div class="app-layout">

    <!-- Encabezado: menú hamburguesa, título y botón modo oscuro -->
    <header class="header">
      <button class="menu-toggle text-xl">☰</button>
      <h1 class="text-2xl font-bold">Tareas y proyectos</h1>
      <button id="dark-toggle" class="dark-toggle">🌙</button>
    </header>

    <!-- Cuerpo: sidebar + contenido principal -->
    <div class="app-body">

      <!-- Sidebar: navegación (cerrado por defecto en móvil) -->
      <aside class="sidebar closed">
        <nav>
          <p class="sidebar-title">Navegación</p>
          <ul class="sidebar-nav">
            <li>
              <a class="sidebar-item active">
                <span class="sidebar-icon">📁</span>
                <span class="sidebar-text">Proyectos</span>
              </a>
            </li>
            <li>
              <a class="sidebar-item" href="#">
                <span class="sidebar-icon">📅</span>
                <span class="sidebar-text">Calendario</span>
              </a>
            </li>
            <li>
              <a class="sidebar-item">
                <span class="sidebar-icon">⚙️</span>
                <span class="sidebar-text">Ajustes</span>
              </a>
            </li>
            <li>
              <a class="sidebar-item">
                <span class="sidebar-icon">⏳</span>
                <span class="sidebar-text">Proximamente...</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Contenido principal -->
      <main class="main-content">
        <div class="content">

          <!-- Sección: formulario para añadir tareas -->
          <section>
            <form id="task-form" class="task-form">
              <label class="task-form"></label>
              <input id="nueva-tarea" type="text" placeholder="Nueva tarea..." class="task-input">
              <button type="submit" class="task-button">Agregar</button>
            </form>
          </section>

          <!-- Sección: lista de tareas con búsqueda -->
          <section>
            <h2 class="task-head-text">Lista de tareas</h2>
            <div class="busqueda mb-4">
              <label class=".task-head-search">Buscar</label>
              <input id="busqueda-input" type="text" placeholder="Filtrar tareas" class="task-input">
            </div>
            <div class="task-bulk-actions">
              <button id="complete-all-btn" type="button" class="task-bulk-btn">Marcar todas como completadas</button>
              <button id="clear-completed-btn" type="button" class="task-bulk-btn danger">Borrar completadas</button>
            </div>
            <ul id="task-list" class="task-list"></ul>
          </section>

        </div>
      </main>

    </div>

    <footer class="app-footer">
      <div class="footer-content">
        <div class="footer-left">
          <span>Cristian Chica</span>
          <a class="footer-mail" href="mailto:cristian.c.s.2000@hormail.com">cristian.c.s.2000@hormail.com</a>
        </div>
        <div class="footer-right">
          <span class="footer-pill">TaskFlow</span>
          <span class="footer-pill">Corner Studios</span>
        </div>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>

</body>
</html>
